<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a3a2a">
<title>国标麻将 · 决策助手</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800;900&display=swap');
:root{
  --bg:#16281e; --felt:#0f1f16; --surface:#1d3025;
  --gold:#dbb42c; --gold-dim:#b89424; --gold-pale:#f0dd88;
  --text:#ece4d0; --dim:#9a8a6a; --muted:#6a5a4a;
  --red:#d44545; --rose:#c0392b; --blue:#3a8fd4; --green:#4a9a5a;
  --orange:#d49a3a; --teal:#2a8a6a;
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
  --shadow:0 2px 16px rgba(0,0,0,0.5);
  --shadow-sm:0 1px 6px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:linear-gradient(180deg,#0b1912 0%,var(--felt) 100%);
  border-bottom:1px solid rgba(219,180,44,0.08);position:sticky;top:0;z-index:100;
}
.header h1{
  font-size:.95rem;font-weight:900;background:linear-gradient(135deg,#f0dd88,#dbb42c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
.header .tag{
  font-size:.5rem;padding:3px 8px;border-radius:20px;
  background:rgba(219,180,44,0.08);color:var(--gold-dim);
  border:1px solid rgba(219,180,44,0.08);margin-left:auto;letter-spacing:1px;
}

.container{max-width:440px;margin:0 auto;padding:6px 8px}

/* ── Hand Strip ── */
.hand-strip{
  display:flex;align-items:center;gap:4px;padding:6px 8px;min-height:44px;
  background:rgba(0,0,0,0.15);border-radius:var(--radius);
  border:1px solid rgba(219,180,44,0.04);margin-bottom:5px;
  overflow-x:auto;flex-wrap:wrap;
}
.hand-strip .t{
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  width:32px;height:38px;border-radius:4px;font-size:.7rem;font-weight:700;
  background:linear-gradient(135deg,#1d3025,#15261c);
  border:1px solid rgba(219,180,44,0.08);color:var(--gold-pale);position:relative;
  flex-shrink:0;transition:all .1s;
}
.hand-strip .t:active{transform:scale(.78)}
.hand-strip .t .x{
  position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;
  background:var(--rose);color:#fff;font-size:.4rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.hand-strip .emp{font-size:.55rem;color:var(--muted);width:100%;text-align:center;padding:6px 0}

/* ── Mode Pills ── */
.mode-bar{display:flex;gap:4px;margin:4px 0}
.mode-pill{
  flex:1;text-align:center;padding:5px 0;border-radius:20px;font-size:.6rem;font-weight:700;cursor:pointer;
  background:rgba(0,0,0,0.1);color:var(--muted);border:1px solid transparent;user-select:none;
  transition:all .15s ease;
}
.mode-pill:active{transform:scale(.94)}
.mode-pill.on{background:rgba(219,180,44,0.06);color:var(--gold);border-color:rgba(219,180,44,0.12)}
.mode-pill.p1{color:#e06060}
.mode-pill.p1.on{background:rgba(212,69,69,0.06);border-color:rgba(212,69,69,0.1);color:#e06060}
.mode-pill.p2{color:#4a9fdf}
.mode-pill.p2.on{background:rgba(58,143,212,0.06);border-color:rgba(58,143,212,0.1);color:#4a9fdf}
.mode-pill.p3{color:#5aba6a}
.mode-pill.p3.on{background:rgba(74,154,90,0.06);border-color:rgba(74,154,90,0.1);color:#5aba6a}

/* ── Tile Grid ── */
.suit-l{font-size:.5rem;color:var(--muted);margin:4px 0 2px;letter-spacing:2px;font-weight:600}
.tile-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:2px}
.tile{
  aspect-ratio:.8;border-radius:5px;cursor:pointer;transition:all .1s ease;
  display:flex;align-items:center;justify-content:center;user-select:none;
  position:relative;font-size:.7rem;font-weight:700;
  background:rgba(0,0,0,0.08);border:1px solid rgba(219,180,44,0.03);
  color:var(--dim);
}
.tile:active{transform:scale(.82)}
/* Selected states */
.tile.hand{
  background:linear-gradient(135deg,rgba(219,180,44,0.12),rgba(219,180,44,0.04));
  color:var(--gold-pale);border-color:rgba(219,180,44,0.2);
  box-shadow:0 0 8px rgba(219,180,44,0.06);
}
.tile.p1{
  background:linear-gradient(135deg,rgba(212,69,69,0.08),rgba(212,69,69,0.02));
  color:#e06060;border-color:rgba(212,69,69,0.1);
}
.tile.p2{
  background:linear-gradient(135deg,rgba(58,143,212,0.08),rgba(58,143,212,0.02));
  color:#4a9fdf;border-color:rgba(58,143,212,0.1);
}
.tile.p3{
  background:linear-gradient(135deg,rgba(74,154,90,0.08),rgba(74,154,90,0.02));
  color:#5aba6a;border-color:rgba(74,154,90,0.1);
}
/* Count badge */
.tile .b{
  position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;
  font-size:.45rem;font-weight:800;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.tile .b.gold{background:var(--gold);color:#000}
.tile .b.r{background:var(--rose);color:#fff}
.tile .b.bl{background:var(--blue);color:#fff}
.tile .b.g{background:var(--green);color:#fff}

/* ── Info Row ── */
.info-row{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  background:rgba(0,0,0,0.06);border-radius:var(--radius-sm);margin:3px 0;
}
.info-row .num{font-size:1rem;font-weight:900;color:var(--gold-pale);min-width:22px;text-align:center}
.info-row .lbl{font-size:.55rem;color:var(--dim);flex:1}
.info-row .btn{
  padding:3px 10px;border-radius:20px;border:1px solid rgba(219,180,44,0.06);
  background:rgba(219,180,44,0.04);color:var(--gold-dim);
  font-size:.55rem;font-weight:700;cursor:pointer;transition:all .1s;
}
.info-row .btn:active{background:rgba(219,180,44,0.1)}

/* ── Settings Bar ── */
.set-bar{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:3px 0;
  border-top:1px solid rgba(219,180,44,0.03);margin-top:2px;
}
.set-bar select{
  padding:4px 7px;border-radius:6px;border:1px solid rgba(219,180,44,0.06);
  background:rgba(0,0,0,0.12);color:var(--text);font-size:.52rem;outline:none;
  font-family:inherit;appearance:none;
}
.set-bar .sel{
  padding:3px 10px;border-radius:20px;font-size:.55rem;font-weight:700;cursor:pointer;
  background:rgba(0,0,0,0.06);color:var(--muted);border:1px solid transparent;user-select:none;
  transition:all .1s;
}
.set-bar .sel.on{background:rgba(219,180,44,0.06);color:var(--gold-dim);border-color:rgba(219,180,44,0.08)}
.set-bar .sel.act{background:rgba(212,69,69,0.06);color:#e06060;border-color:rgba(212,69,69,0.08)}

/* ── Opponent Summary ── */
.opp-row{display:flex;gap:5px;margin:3px 0}
.opp-box{
  flex:1;background:rgba(0,0,0,0.04);border-radius:var(--radius-sm);
  padding:4px 6px;border:1px solid transparent;cursor:pointer;transition:all .1s;
}
.opp-box:active{transform:scale(.95)}
.opp-box .l{font-size:.48rem;color:var(--muted);margin-bottom:1px}
.opp-box .n{font-size:.6rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-box.p1{border-color:rgba(212,69,69,0.08)}.opp-box.p1 .n{color:#e06060}
.opp-box.p2{border-color:rgba(58,143,212,0.08)}.opp-box.p2 .n{color:#4a9fdf}
.opp-box.p3{border-color:rgba(74,154,90,0.08)}.opp-box.p3 .n{color:#5aba6a}

/* ── Analyze Button ── */
.analyze-btn{
  width:100%;padding:10px 0;border-radius:var(--radius);border:none;margin:5px 0;
  background:linear-gradient(135deg,rgba(219,180,44,0.1),rgba(219,180,44,0.04));
  color:var(--gold-dim);font-size:.85rem;font-weight:900;cursor:pointer;
  letter-spacing:3px;transition:all .2s ease;font-family:inherit;
}
.analyze-btn:active{transform:scale(.97)}
.analyze-btn.ready{
  background:linear-gradient(135deg,rgba(219,180,44,0.18),rgba(219,180,44,0.08));
  color:var(--gold);box-shadow:0 0 20px rgba(219,180,44,0.06);
}

/* ═══════════════ RESULTS ═══════════════ */
.result-area{display:none;margin-top:5px;animation:fadeIn .2s ease}
.result-area.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Hero cards */
.hero{
  padding:10px 12px;border-radius:var(--radius);margin-bottom:5px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:all .1s;backdrop-filter:blur(4px);
}
.hero:active{transform:scale(.98)}
.hero.pri{
  background:linear-gradient(135deg,rgba(219,180,44,0.06),rgba(219,180,44,0.02));
  border:1px solid rgba(219,180,44,0.12);
}
.hero.disc{
  background:linear-gradient(135deg,rgba(58,143,212,0.06),rgba(58,143,212,0.02));
  border:1px solid rgba(58,143,212,0.1);
}
.hero.act{
  background:linear-gradient(135deg,rgba(212,69,69,0.06),rgba(212,69,69,0.02));
  border:1px solid rgba(212,69,69,0.1);
}
.hero .ic{
  width:38px;height:46px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;flex-shrink:0;
}
.hero.pri .ic{background:rgba(219,180,44,0.08);color:var(--gold)}
.hero.disc .ic{background:rgba(58,143,212,0.08);color:var(--blue)}
.hero.act .ic{background:rgba(212,69,69,0.08);color:var(--red)}
.hero .t{flex:1;font-size:.85rem;font-weight:800;line-height:1.3}
.hero .t .s{font-size:.52rem;font-weight:400;color:var(--dim);margin-top:1px}
.hero .r{text-align:right;font-size:.7rem;font-weight:700;color:var(--green);flex-shrink:0}
.hero .r .s{font-size:.5rem;font-weight:400;color:var(--muted)}

/* Stat cards */
.stat-row{display:flex;gap:5px;margin:4px 0}
.stat-box{
  flex:1;background:linear-gradient(135deg,rgba(0,0,0,0.04),rgba(0,0,0,0.02));
  border-radius:var(--radius-sm);padding:6px 8px;border:1px solid rgba(219,180,44,0.03);
}
.stat-box .l{font-size:.48rem;color:var(--muted);margin-bottom:2px;font-weight:600;letter-spacing:1px}
.stat-box .v{font-size:.85rem;font-weight:900}
.stat-box .v.g{color:var(--green)}.stat-box .v.go{color:var(--gold-pale)}.stat-box .v.o{color:var(--orange)}

/* Section cards */
.sec{
  background:linear-gradient(135deg,rgba(0,0,0,0.04),rgba(0,0,0,0.02));
  border-radius:var(--radius-sm);padding:5px 8px;margin-bottom:4px;
  border:1px solid rgba(219,180,44,0.02);
}
.sec .l{font-size:.48rem;font-weight:700;color:var(--muted);margin-bottom:3px;letter-spacing:1px}
.sec .tbl{width:100%;border-collapse:collapse;font-size:.65rem}
.sec .tbl th{
  font-size:.45rem;color:var(--muted);padding:3px 4px;text-align:left;
  border-bottom:1px solid rgba(219,180,44,0.04);letter-spacing:1px;font-weight:600;
}
.sec .tbl td{padding:3px 4px;border-bottom:1px solid rgba(219,180,44,0.02)}
.sec .tbl .tn{font-weight:700;color:var(--gold-pale)}
.sec .tbl .fn{color:var(--orange);font-weight:700}

/* Fan list */
.fan-list{padding:2px 0}
.fan-item{font-size:.55rem;padding:2px 0;display:flex;justify-content:space-between;color:var(--dim);border-bottom:1px solid rgba(219,180,44,0.02)}
.fan-item .fv{color:var(--orange);font-weight:600}

/* Defense */
.def-sec{padding:4px 6px;margin-bottom:4px}
.def-sec .l{font-size:.48rem;font-weight:700;color:var(--muted);margin-bottom:2px;letter-spacing:1px}
.def-chip{display:inline-block;padding:2px 6px;margin:1px;border-radius:4px;font-size:.5rem;font-weight:700}
.def-chip.d{background:rgba(212,69,69,0.06);color:#e06060;border:1px solid rgba(212,69,69,0.06)}
.def-chip.s{background:rgba(74,154,90,0.06);color:#5aba6a;border:1px solid rgba(74,154,90,0.06);opacity:.7}

/* Acceptance chips */
.accept-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.accept-chip{
  padding:2px 7px;border-radius:12px;
  background:rgba(74,154,90,0.04);border:1px solid rgba(74,154,90,0.06);
  font-size:.55rem;color:var(--green);font-weight:600;
}

/* Misc */
.loading{text-align:center;padding:14px;color:var(--muted);font-size:.65rem;letter-spacing:2px}
.error{
  background:rgba(212,69,69,0.04);border:1px solid rgba(212,69,69,0.08);
  color:#e06060;padding:6px 10px;border-radius:var(--radius-sm);font-size:.6rem;margin:3px 0;
}
.ft{text-align:center;font-size:.4rem;color:var(--muted);padding:4px 0;opacity:.4;letter-spacing:1px}
</style>
</head>
<body>

<div class="header">
  <h1>🀄 国标麻将</h1>
  <span class="tag">通行规则</span>
</div>

<div class="container">

<!-- ═══ HAND STRIP ═══ -->
<div class="hand-strip" id="handStrip">
  <div class="emp">点下方牌选入手中</div>
</div>

<!-- ═══ MODE SELECTOR ═══ -->
<div class="mode-bar" id="modeBar"></div>

<!-- ═══ UNIFIED TILE GRID ═══ -->
<div id="tileGrid"></div>

<!-- ═══ INFO ROW ═══ -->
<div class="info-row">
  <span class="num" id="cntNum">0</span>
  <span class="lbl">张手牌 · 长按清空</span>
  <button class="btn" onclick="clrHand()">清手牌</button>
</div>

<!-- ═══ OPPONENT SUMMARY ═══ -->
<div class="opp-row" id="oppRow"></div>

<!-- ═══ SETTINGS ═══ -->
<div class="set-bar">
  <span style="font-size:.5rem;color:var(--muted)">座</span>
  <select id="selWind"><option value="0">东</option><option value="1">南</option><option value="2">西</option><option value="3">北</option></select>
  <select id="selRound"><option value="0">东</option><option value="1">南</option><option value="2">西</option><option value="3">北</option></select>
  <span class="sel on" id="modeSel" onclick="toggleDraw()">自摸</span>
  <span class="sel" id="lastSel" onclick="toggleLast()">出牌 ✕</span>
  <span id="lastLabel" style="font-size:.5rem;color:var(--muted);display:none"></span>
</div>

<!-- ═══ ANALYZE ═══ -->
<button class="analyze-btn" id="goBtn" onclick="analyze()">🎯 分析</button>

<!-- ═══ RESULTS ═══ -->
<div class="result-area" id="resultArea">
  <div id="resultContent"></div>
</div>

<div class="ft">GMahjong Assist</div>
</div>

<script>
// ════════════════ TILE DATA ════════════════
const SUITS=[
  {id:0,name:'万',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:1,name:'条',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:2,name:'饼',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:3,name:'风',tiles:[1,2,3,4]},
  {id:4,name:'箭',tiles:[1,2,3]},
];
function T(s,r){
  const base=[0,36,72,108,120];  // per-suit offset (matches Python encode)
  const per=[4,4,4,3,4];         // copies per tile type
  return base[s]+(r-1)*per[s];
}
const ALL=[];
SUITS.forEach(s=>s.tiles.forEach(r=>ALL.push({code:T(s.id,r),suit:s.id,rank:r})));
function tn(c){const t=ALL.find(x=>x.code===c);if(!t)return'?';const n=['一','二','三','四','五','六','七','八','九','东','南','西','北','中','发','白'];return t.suit<=2?n[t.rank-1]+['万','条','饼'][t.suit]:['东','南','西','北','中','发','白'][t.rank-1+(t.suit===3?0:4)]}
function ts(c){const t=ALL.find(x=>x.code===c);if(!t)return'?';if(t.suit<=2)return t.rank+['万','条','饼'][t.suit];return '东南西北中发白'[t.rank-1+(t.suit===3?0:4)]}

// ════════════════ STATE ════════════════
let hand={};           // {code: count}
let discards={1:[],2:[],3:[]};  // 下家/对家/上家
let melds={1:[],2:[],3:[]};
let lastDisc=null;
let target=0;          // 0=手牌, 1=下家, 2=对家, 3=上家
let isDraw=true;
let showLast=false;

const PLAYER_NAMES=['','下家','对家','上家'];

// ════════════════ HAND ════════════════
function renderAll(){
  renderStrip();
  renderModeBar();
  renderGrid();
  renderOppRow();
  updateInfo();
  updateLastLabel();
}

function renderStrip(){
  const codes=Object.keys(hand).map(Number).sort((a,b)=>a-b);
  let h='';
  if(!codes.length)h='<div class="emp">点下方牌选入手中 · 长按牌移除</div>';
  else for(const c of codes){
    const n=hand[c];
    h+=`<div class="t" onclick="rmOne(${c})">${ts(c)}${n>1?`<span style="font-size:.4rem;opacity:.6;margin-left:1px">×${n}</span>`:''}<span class="x">✕</span></div>`;
  }
  document.getElementById('handStrip').innerHTML=h;
}

function renderModeBar(){
  const names=['🧩 手牌','🔴 下家','🔵 对家','🟢 上家'];
  let h='';
  for(let i=0;i<4;i++){
    const cls=i===0?'':` p${i}`;
    const cnt=i===0?totalHand():(discards[i]||[]).length;
    const act=target===i?' on':'';
    h+=`<div class="mode-pill${cls}${act}" onclick="switchMode(${i})">${names[i]} <span style="font-size:.45rem;opacity:.6">${cnt}</span></div>`;
  }
  document.getElementById('modeBar').innerHTML=h;
}

function totalHand(){return Object.values(hand).reduce((a,b)=>a+b,0)}
function updateInfo(){
  const t=totalHand();
  document.getElementById('cntNum').textContent=t;
  const btn=document.getElementById('goBtn');
  if(t>=13)btn.classList.add('ready');
  else btn.classList.remove('ready');
}

function switchMode(i){target=i;renderAll();document.getElementById('resultArea').classList.remove('show')}

// ════════════════ UNIFIED GRID ════════════════
function renderGrid(){
  if(showLast&&lastDisc!==null){
    // Quick mode: show only the selected last discard tile
    renderLastMode();
    return;
  }

  let h='';
  for(const s of SUITS){
    h+=`<div class="suit-l">${s.name}</div><div class="tile-grid">`;
    for(const r of s.tiles){
      const c=T(s.id,r);
      const hc=hand[c]||0;
      const d1=(discards[1]||[]).filter(x=>x===c).length;
      const d2=(discards[2]||[]).filter(x=>x===c).length;
      const d3=(discards[3]||[]).filter(x=>x===c).length;

      let cls='';
      let badge='';
      if(target===0 && hc>0){cls=' hand';badge=`<span class="b gold">${hc}</span>`}
      else if(target===1 && d1>0){cls=' p1';badge=`<span class="b r">${d1}</span>`}
      else if(target===2 && d2>0){cls=' p2';badge=`<span class="b bl">${d2}</span>`}
      else if(target===3 && d3>0){cls=' p3';badge=`<span class="b g">${d3}</span>`}

      h+=`<div class="tile${cls}" onclick="tapTile(${c})">${ts(c)}${badge}</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('tileGrid').innerHTML=h;

  // long press
  document.querySelectorAll('#tileGrid .tile').forEach(el=>{
    let timer,code;
    el.addEventListener('pointerdown',function(){
      const m=this.getAttribute('onclick');
      if(m)code=parseInt(m.match(/\d+/)[0]);
      timer=setTimeout(()=>{rmTile(code);timer=null},400);
    });
    el.addEventListener('pointerup',()=>{if(timer){clearTimeout(timer);timer=null}});
    el.addEventListener('pointerleave',()=>{if(timer){clearTimeout(timer);timer=null}});
  });
}

function renderLastMode(){
  // Minimal grid: pick the last discarded tile
  let h='<div class="suit-l" style="color:var(--orange)">⚡ 选择对方刚打的牌 (点击确认)</div>';
  for(const s of SUITS){
    h+=`<div class="suit-l">${s.name}</div><div class="tile-grid">`;
    for(const r of s.tiles){
      const c=T(s.id,r);
      const sel=lastDisc===c?' hand':'';
      h+=`<div class="tile${sel}" onclick="setLast(${c})">${ts(c)}</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('tileGrid').innerHTML=h;
}

function tapTile(c){
  if(showLast){setLast(c);return}
  if(target===0){
    if((hand[c]||0)>=4)return;
    if(totalHand()>=14)return;  // 上限14张
    hand[c]=(hand[c]||0)+1;
  } else {
    if((discards[target]||[]).filter(x=>x===c).length>=4)return;
    discards[target].push(c);
  }
  renderAll();
  document.getElementById('resultArea').classList.remove('show');
}

function setLast(c){
  lastDisc=c;
  showLast=false;  // auto-exit after selection
  document.getElementById('lastSel').textContent=ts(c)+' ⚡';
  document.getElementById('lastSel').classList.add('act');
  document.getElementById('lastLabel').textContent=ts(c);
  document.getElementById('lastLabel').style.display='inline';
  renderAll();
  document.getElementById('resultArea').classList.remove('show');
}

function rmTile(c){
  if(target===0){
    delete hand[c];
  } else {
    discards[target]=discards[target].filter(x=>x!==c);
  }
  renderAll();
}

function rmOne(c){
  if(hand[c]){hand[c]--;if(hand[c]<=0)delete hand[c];renderAll()}
}
function clrHand(){hand={};renderAll()}

// ════════════════ OPPONENT ROW ════════════════
function renderOppRow(){
  let h='';
  for(let i=1;i<=3;i++){
    const tiles=discards[i]||[];
    const byCode={};
    for(const t of tiles)byCode[t]=(byCode[t]||0)+1;
    const codes=Object.keys(byCode).map(Number).sort((a,b)=>a-b);
    const names=codes.map(c=>ts(c)+(byCode[c]>1?'×'+byCode[c]:'')).join(' ');
    const active=target===i?' style="background:rgba(232,197,74,0.04)"':'';
    h+=`<div class="opp-box p${i}" onclick="switchMode(${i})"${active}>
      <div class="l">${PLAYER_NAMES[i]}</div>
      <div class="n">${names||'—'}</div>
    </div>`;
  }
  document.getElementById('oppRow').innerHTML=h;
}

// ════════════════ LAST DISCARD / MODE ════════════════
function toggleDraw(){
  isDraw=!isDraw;
  const el=document.getElementById('modeSel');
  el.textContent=isDraw?'自摸':'他家';
  el.classList.toggle('on');
  document.getElementById('resultArea').classList.remove('show');
}
function toggleLast(){
  showLast=!showLast;
  const el=document.getElementById('lastSel');
  el.textContent=showLast?'出牌 ⚡':'出牌 ✕';
  el.classList.toggle('act');
  document.getElementById('lastLabel').style.display=showLast?'inline':'none';
  document.getElementById('resultArea').classList.remove('show');
  if(!showLast){lastDisc=null;updateLastLabel()}
}
function updateLastLabel(){
  const el=document.getElementById('lastLabel');
  if(lastDisc!==null){el.textContent=ts(lastDisc);el.style.display='inline'}
  else el.style.display='none';
}

// ════════════════ ANALYZE ════════════════
async function analyze(){
  const tiles=[];
  for(const[c,n]of Object.entries(hand))for(let i=0;i<n;i++)tiles.push(parseInt(c));
  tiles.sort((a,b)=>a-b);

  if(tiles.length<13){
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('resultContent').innerHTML=`<div class="error">至少需要13张牌（当前${tiles.length}张）</div>`;
    return;
  }

  const rd=document.getElementById('resultContent');
  rd.innerHTML=`<div class="loading">分析中 ⌛</div>`;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});

  try{
    const body={
      hand:tiles.slice(0,14), melds:[],
      discards:{1:discards[1],2:discards[2],3:discards[3]},
      opponent_melds:{},
      seat_wind:parseInt(document.getElementById('selWind').value),
      round_wind:parseInt(document.getElementById('selRound').value),
      is_self_drawn:isDraw,
    };
    if(lastDisc!==null) body.last_discard=lastDisc;
    for(const[s,l]of Object.entries(melds))if(l.length>0)body.opponent_melds[s]=l;

    const resp=await fetch('/api/game-analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    const data=await resp.json();
    if(!resp.ok){rd.innerHTML=`<div class="error">${data.detail||'分析失败'}</div>`;return}

    let h='';

    // ── HERO recommendations ──
    const hasAction=data.action_options&&data.action_options.length>0;
    const hasDiscard=data.discard_options&&data.discard_options.length>0;
    const bestDisc=hasDiscard?data.discard_options[0]:null;
    const tsumo=hasAction?data.action_options.find(a=>a.action==='tsumo'):null;
    const otherAct=hasAction?data.action_options.filter(a=>a.action!=='tsumo'):[];

    if(tsumo){
      h+=`<div class="hero pri"><div class="ic">🏆</div><div class="t">胡 ${tn(tsumo.tiles[0].code)}<div class="s">荣和 · ${tsumo.fan}番</div></div><div class="r">${tsumo.fan}番</div></div>`;
    }

    if(bestDisc){
      const dc={low:'🟢',mid:'🟡',high:'🔴'}[bestDisc.danger_level]||'⚪';
      const st=bestDisc.post_shanten===0?'听牌':bestDisc.post_shanten+'上听';
      h+=`<div style="text-align:center;font-size:.55rem;font-weight:700;color:var(--gold);letter-spacing:2px;margin:4px 0 2px">━━  👉 最优打法  👈  ━━</div>`;
      const rColor=bestDisc.danger_level==='低'?'var(--green)':bestDisc.danger_level==='中'?'var(--orange)':'var(--red)';
      h+=`<div class="hero disc" style="border-width:2px;border-color:rgba(232,197,74,0.25);padding:10px 12px" onclick="rmOne(${bestDisc.tile.code});renderAll();document.getElementById('resultArea').classList.remove('show')">
        <div class="ic" style="width:42px;height:52px;font-size:1.1rem">${dc}</div>
        <div class="t" style="font-size:1rem">打 ${tn(bestDisc.tile.code)}<div class="s" style="font-size:.6rem">${bestDisc.reason} · 进张${bestDisc.acceptance}</div></div>
        <div class="r" style="font-size:.8rem;color:${rColor}">${st}<div class="s" style="font-size:.55rem">${bestDisc.acceptance}进</div></div></div>`;
    }

    for(const a of otherAct){
      const al={chi:'🟦',pon:'🟧',kan:'🟪'}[a.action]||a.action;
      const tn2=a.tiles.map(t=>tn(t.code)).join('');
      const st2=a.post_shanten===0?'听牌':a.post_shanten===-1?'胡牌':a.post_shanten+'上听';
      const aln={chi:'吃',pon:'碰',kan:'杠'}[a.action]||a.action;
      h+=`<div class="hero act"><div class="ic" style="font-size:.65rem">${al} ${aln}</div>
        <div class="t">${tn2}<div class="s">→ ${st2} · 进张${a.acceptance}</div></div>
        <div class="r" style="color:${a.post_shanten<=0?'var(--gold)':'var(--green)'}">${st2}</div></div>`;
    }

    // ── Stats ──
    const sc=data.shanten===0?'go':data.shanten<=1?'g':data.shanten===-1?'o':'o';
    const stxt=data.shanten===-1?'🏆胡牌':data.shanten===0?'🎯听牌':`⬆${data.shanten}上听`;
    h+=`<div class="stat-row">
      <div class="stat-box"><div class="l">向听</div><div class="v ${sc}">${stxt}</div></div>
      <div class="stat-box"><div class="l">进张</div><div class="v g">${data.acceptance}张</div></div>
    </div>`;

    if(data.acceptance_tiles&&data.acceptance_tiles.length>0){
      h+=`<div class="sec"><div class="l">进张牌</div><div class="accept-chips">`;
      for(const t of data.acceptance_tiles)h+=`<span class="accept-chip">${tn(t.code)}</span>`;
      h+=`</div></div>`;
    }

    // ── All discards ──
    if(hasDiscard&&data.discard_options.length>1){
      h+=`<div class="sec"><div class="l">出牌对比</div>
        <table class="tbl"><tr><th>牌</th><th>打后</th><th>进张</th><th>危险</th></tr>`;
      for(const o of data.discard_options){
        const dc2={low:'🟢',mid:'🟡',high:'🔴'}[o.danger_level]||'⚪';
        const st3=o.post_shanten===0?'听牌':o.post_shanten+'上听';
        h+=`<tr${o===data.discard_options[0]?' style="background:rgba(232,197,74,0.03)"':''}>
          <td class="tn">${tn(o.tile.code)}</td><td>${st3}</td><td>${o.acceptance}</td><td>${dc2}</td></tr>`;
      }
      h+=`</table></div>`;
    }

    // ── Listen ──
    if(data.listen_analysis&&data.listen_analysis.is_tenpai&&data.listen_analysis.options.length>0){
      const best=data.listen_analysis.options[0];
      h+=`<div class="sec"><div class="l">🏆 最佳听牌</div>
        <div style="font-size:.8rem;font-weight:800;color:var(--gold-pale);margin-bottom:3px">${tn(best.tile.code)} · ${best.fan}番 · 剩${best.remaining}张</div>`;
      if(best.fan_items&&best.fan_items.length>0){
        h+=`<div class="fan-list">`;
        for(const f of best.fan_items.slice(0,8))h+=`<div class="fan-item">${f.name}<span class="fv">${f.fan}番</span></div>`;
        h+=`</div>`;
      }
      if(data.listen_analysis.options.length>1){
        h+=`<table class="tbl"><tr><th>牌</th><th>剩</th><th>番</th><th>评分</th></tr>`;
        for(const o of data.listen_analysis.options){
          h+=`<tr${o===data.listen_analysis.options[0]?' style="background:rgba(232,197,74,0.03)"':''}>
            <td class="tn">${tn(o.tile.code)}</td><td>×${o.remaining}</td><td class="fn">${o.fan}番</td><td style="color:var(--green);font-weight:700">${o.score.toFixed(1)}</td></tr>`;
        }
        h+=`</table>`;
      }
      h+=`</div>`;
    }

    // ── Defense ──
    if(data.defense&&data.defense.dangerous_tiles&&data.defense.dangerous_tiles.length>0){
      h+=`<div class="def-sec"><div class="l">🔴 危险牌</div>`;
      for(const d of data.defense.dangerous_tiles.slice(0,10))h+=`<span class="def-chip d">${tn(d.tile)}</span>`;
      h+=`</div>`;
      if(data.defense.safe_tiles&&data.defense.safe_tiles.length>0){
        h+=`<div class="def-sec"><div class="l">🟢 安全牌</div>`;
        for(const s of data.defense.safe_tiles.slice(0,8))h+=`<span class="def-chip s">${tn(s.tile)}</span>`;
        h+=`</div>`;
      }
    }

    rd.innerHTML=h;

  }catch(e){rd.innerHTML=`<div class="error">${e.message}</div>`}
}


</script>
