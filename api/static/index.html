<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a3a2a">
<title>国标麻将 · 决策助手</title>
<style>
:root{
  --bg:#1a2e22; --card:#0d1f15; --surface:#132418;
  --gold:#e8c54a; --gold-dim:#c4a335; --gold-pale:#f0dd88;
  --text:#ebe4d4; --dim:#9a8a6a; --muted:#6a5a4a;
  --red:#d44545; --blue:#3a8fd4; --green:#4a9a5a; --orange:#d49a3a;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
}

/* ── Header ── */
.header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:linear-gradient(180deg,#0d1f15,var(--card));
  border-bottom:1px solid rgba(232,197,74,0.08);position:sticky;top:0;z-index:100;
}
.header h1{font-size:.9rem;font-weight:800;color:var(--gold-pale);letter-spacing:1px}
.header .badge{
  font-size:.5rem;padding:2px 6px;border-radius:8px;
  background:rgba(232,197,74,0.1);color:var(--gold-dim);margin-left:auto;
}

/* ── Container ── */
.container{max-width:440px;margin:0 auto;padding:6px 8px}

/* ═══════════════════ HAND STRIP ═══════════════════ */
.hand-strip{
  display:flex;align-items:center;gap:3px;padding:6px 8px;min-height:48px;
  background:rgba(0,0,0,0.2);border-radius:8px;border:1px solid rgba(232,197,74,0.06);
  margin-bottom:6px;overflow-x:auto;flex-wrap:wrap;
}
.hand-strip .tile-card{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:36px;border-radius:4px;font-size:.7rem;font-weight:700;
  background:var(--surface);border:1px solid rgba(232,197,74,0.12);
  color:var(--gold-pale);position:relative;flex-shrink:0;
  cursor:pointer;transition:all .08s;
}
.hand-strip .tile-card:active{transform:scale(.85)}
.hand-strip .tile-card .x{
  position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;
  background:var(--red);color:#fff;font-size:.5rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.hand-strip .tile-card.suit-wan{color:#e8c54a;border-color:rgba(232,197,74,0.2)}
.hand-strip .tile-card.suit-tiao{color:#6abf7a;border-color:rgba(106,191,122,0.2)}
.hand-strip .tile-card.suit-bing{color:#4a9fdf;border-color:rgba(74,159,223,0.2)}
.hand-strip .tile-card.suit-feng{color:#e8a040;border-color:rgba(232,160,64,0.15)}
.hand-strip .tile-card.suit-jian{color:#d45555;border-color:rgba(212,85,85,0.15)}
.hand-strip .empty{font-size:.6rem;color:var(--muted);width:100%;text-align:center}

/* ═══════════════════ TILE GRID ═══════════════════ */
.suit-label{
  font-size:.55rem;color:var(--muted);margin:3px 0 1px;letter-spacing:1px;
}
.tile-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:3px}
.tile{
  aspect-ratio:1;border-radius:5px;border:1px solid rgba(232,197,74,0.06);
  background:rgba(0,0,0,0.12);color:var(--dim);
  font-size:.7rem;font-weight:700;cursor:pointer;transition:all .08s;
  display:flex;align-items:center;justify-content:center;
  user-select:none;position:relative;min-height:34px;
}
.tile:active{transform:scale(.85);background:rgba(232,197,74,0.08)}
.tile.sel{
  border-color:rgba(232,197,74,0.35);
  box-shadow:0 0 8px rgba(232,197,74,0.1);
}
.tile.sel.wan{background:rgba(232,197,74,0.18);color:var(--gold-pale)}
.tile.sel.tiao{background:rgba(106,191,122,0.18);color:#8adf9a}
.tile.sel.bing{background:rgba(74,159,223,0.18);color:#7abfef}
.tile.sel.feng{background:rgba(232,160,64,0.15);color:#f0b050}
.tile.sel.jian{background:rgba(212,85,85,0.15);color:#e07070}
.tile .cnt{
  position:absolute;top:-4px;right:-4px;
  width:15px;height:15px;border-radius:50%;
  background:var(--gold);color:#000;font-size:.5rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.tile .cnt.c2{background:#f0dd88;font-size:.45rem}
.tile .cnt.c3{background:#e8c54a;font-size:.45rem}
.tile .cnt.c4{background:#d4a335;font-size:.4rem}

/* ── Info Bar ── */
.info-bar{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  background:rgba(0,0,0,0.1);border-radius:6px;margin:4px 0;
}
.info-bar .num{font-size:1rem;font-weight:800;color:var(--gold-pale);min-width:24px;text-align:center}
.info-bar .lbl{font-size:.6rem;color:var(--dim);flex:1}
.info-bar .btn{
  padding:3px 10px;border-radius:5px;border:1px solid rgba(232,197,74,0.1);
  background:rgba(232,197,74,0.06);color:var(--gold-dim);
  font-size:.6rem;font-weight:700;cursor:pointer;
}
.info-bar .btn:active{background:rgba(232,197,74,0.12)}

/* ═══════════════════ GAME TOOLBAR ═══════════════════ */
.game-bar{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
  padding:4px 0;margin:2px 0;
}
.game-bar select{
  padding:4px 6px;border-radius:4px;border:1px solid rgba(232,197,74,0.08);
  background:rgba(0,0,0,0.12);color:var(--text);font-size:.58rem;outline:none;
}
.game-bar .pill{
  padding:3px 8px;border-radius:10px;font-size:.58rem;font-weight:600;
  cursor:pointer;background:rgba(0,0,0,0.1);color:var(--muted);border:1px solid transparent;
  user-select:none;
}
.game-bar .pill:active{transform:scale(.93)}
.game-bar .pill.on{background:rgba(232,197,74,0.08);color:var(--gold-dim);border-color:rgba(232,197,74,0.15)}
.game-bar .pill.active{background:rgba(212,69,69,0.1);color:#d44545;border-color:rgba(212,69,69,0.15)}

/* ═══════════════════ DISCARD SECTION ═══════════════════ */
.section-toggle{
  display:flex;align-items:center;gap:4px;padding:5px 0;cursor:pointer;
  border-top:1px solid rgba(232,197,74,0.04);
}
.section-toggle .arr{font-size:.5rem;color:var(--muted);transition:transform .15s}
.section-toggle .arr.on{transform:rotate(90deg)}
.section-toggle .t{font-size:.6rem;font-weight:600;color:var(--dim);flex:1}
.section-toggle .hint{font-size:.5rem;color:var(--muted)}
.section-body{overflow:hidden;max-height:0;transition:max-height .2s}
.section-body.on{max-height:800px}

.player-strip{display:flex;gap:4px;margin:3px 0;flex-wrap:wrap}
.player-chip{
  padding:2px 10px;border-radius:12px;font-size:.6rem;font-weight:600;
  cursor:pointer;background:rgba(0,0,0,0.08);color:var(--muted);
  border:1px solid transparent;user-select:none;
}
.player-chip.s1{color:#d44545}.player-chip.s1.on{background:rgba(212,69,69,0.08);border-color:rgba(212,69,69,0.15)}
.player-chip.s2{color:#3a8fd4}.player-chip.s2.on{background:rgba(58,143,212,0.08);border-color:rgba(58,143,212,0.15)}
.player-chip.s3{color:#4a9a5a}.player-chip.s3.on{background:rgba(74,154,90,0.08);border-color:rgba(74,154,90,0.15)}

/* ═══════════════════ ANALYZE BUTTON ═══════════════════ */
.analyze-area{
  display:flex;gap:6px;margin:6px 0;
}
.analyze-btn{
  flex:1;padding:10px;border-radius:8px;border:none;
  background:linear-gradient(135deg,rgba(232,197,74,0.15),rgba(232,197,74,0.08));
  color:var(--gold);font-size:.9rem;font-weight:800;
  cursor:pointer;letter-spacing:2px;
}
.analyze-btn:active{transform:scale(.97);background:linear-gradient(135deg,rgba(232,197,74,0.2),rgba(232,197,74,0.12))}

/* ═══════════════════ RESULTS ═══════════════════ */
.result-area{display:none;margin-top:6px}
.result-area.show{display:block}

/* ── Top Action Card ── */
.action-hero{
  padding:10px 12px;border-radius:10px;margin-bottom:6px;
  border:1px solid rgba(232,197,74,0.12);
  display:flex;align-items:center;gap:10px;
}
.action-hero.primary{background:linear-gradient(135deg,rgba(232,197,74,0.08),rgba(232,197,74,0.03));border-color:rgba(232,197,74,0.2)}
.action-hero.discard{background:linear-gradient(135deg,rgba(58,143,212,0.08),rgba(58,143,212,0.03));border-color:rgba(58,143,212,0.15)}
.action-hero.action{background:linear-gradient(135deg,rgba(212,69,69,0.08),rgba(212,69,69,0.03));border-color:rgba(212,69,69,0.15)}
.action-hero .icon-box{
  width:38px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;flex-shrink:0;
}
.action-hero.primary .icon-box{background:rgba(232,197,74,0.12);color:var(--gold)}
.action-hero.discard .icon-box{background:rgba(58,143,212,0.12);color:var(--blue)}
.action-hero.action .icon-box{background:rgba(212,69,69,0.12);color:var(--red)}
.action-hero .main{
  flex:1;font-size:.85rem;font-weight:800;line-height:1.3;
}
.action-hero .main .sub{font-size:.58rem;font-weight:400;color:var(--dim);margin-top:1px}
.action-hero .side{text-align:right;font-size:.7rem;font-weight:700;color:var(--green);flex-shrink:0}
.action-hero .side .sub{font-size:.55rem;font-weight:400;color:var(--muted)}

/* ── Listen Table ── */
.listen-card{background:rgba(0,0,0,0.08);border-radius:8px;padding:6px 8px;margin-bottom:5px}
.listen-card .lbl{font-size:.55rem;font-weight:700;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
.listen-table{width:100%;border-collapse:collapse;font-size:.7rem}
.listen-table th{font-size:.52rem;color:var(--muted);padding:2px 4px;text-align:left;border-bottom:1px solid rgba(232,197,74,0.05);letter-spacing:1px}
.listen-table td{padding:3px 4px;border-bottom:1px solid rgba(232,197,74,0.03)}
.listen-table .tn{font-weight:700;color:var(--gold-pale)}
.listen-table .sc{color:var(--green);font-weight:700}

/* ── Fan Items ── */
.fan-card{background:rgba(0,0,0,0.06);border-radius:6px;padding:5px 8px;margin-bottom:4px}
.fan-item{font-size:.6rem;padding:1px 0;display:flex;justify-content:space-between;color:var(--dim)}
.fan-item .fv{color:var(--orange)}

/* ── Defense Chips ── */
.def-section{background:rgba(0,0,0,0.06);border-radius:6px;padding:5px 8px;margin-bottom:4px}
.def-section .lbl{font-size:.52rem;font-weight:600;color:var(--muted);margin-bottom:2px}
.def-chip{display:inline-block;padding:1px 5px;margin:1px;border-radius:3px;font-size:.55rem;font-weight:600}
.def-chip.danger{background:rgba(212,69,69,0.08);color:#e06060}
.def-chip.safe{background:rgba(74,154,90,0.08);color:#6aba7a;opacity:.7}

/* ── Loading / Error ── */
.loading{text-align:center;padding:14px;color:var(--muted);font-size:.7rem}
.error{
  background:rgba(212,69,69,0.08);border:1px solid rgba(212,69,69,0.12);
  color:#e06060;padding:6px 10px;border-radius:6px;font-size:.65rem;margin-top:4px;
}

/* ── Footer ── */
.ft{text-align:center;font-size:.45rem;color:var(--muted);padding:4px 0;opacity:.6}

/* ── Meld/Mini forms ── */
.mini-form{display:flex;gap:4px;align-items:center;margin:4px 0}
.mini-form input{
  flex:1;padding:3px 6px;border-radius:4px;border:1px solid rgba(232,197,74,0.06);
  background:rgba(0,0,0,0.1);color:var(--text);font-size:.55rem;outline:none;
}
.mini-form .btn{
  padding:3px 8px;border-radius:4px;border:1px solid rgba(232,197,74,0.1);
  background:rgba(232,197,74,0.06);color:var(--gold-dim);
  font-size:.55rem;font-weight:600;cursor:pointer;
}
.meld-bar{display:flex;gap:3px;flex-wrap:wrap;margin:3px 0}
.meld-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 5px 1px 8px;border-radius:10px;
  background:rgba(232,197,74,0.04);border:1px solid rgba(232,197,74,0.06);
  font-size:.5rem;cursor:pointer;color:var(--dim);
}
.meld-chip .rm{color:var(--red);font-size:.45rem}
</style>
</head>
<body>

<div class="header">
  <h1>🀄 国标麻将</h1>
  <span class="badge">通行规则 · 8番起胡</span>
</div>

<div class="container">

<!-- ═══ HAND STRIP ═══ -->
<div class="hand-strip" id="handStrip">
  <div class="empty">点牌选入手中</div>
</div>

<!-- ═══ INFO BAR ═══ -->
<div class="info-bar">
  <span class="num" id="cntNum">0</span>
  <span class="lbl">张手牌 · 长按牌选多张</span>
  <button class="btn" onclick="clrHand()">清除</button>
</div>

<!-- ═══ TILE GRID ═══ -->
<div id="tileGrid"></div>

<!-- ═══ GAME TOOLBAR ═══ -->
<div class="game-bar">
  <span style="font-size:.55rem;color:var(--muted)">座</span>
  <select id="selWind"><option value="0">东</option><option value="1">南</option><option value="2">西</option><option value="3">北</option></select>
  <select id="selRound"><option value="0">东圈</option><option value="1">南圈</option><option value="2">西圈</option><option value="3">北圈</option></select>
  <span class="pill on" id="modePill" onclick="toggleMode()">当前摸牌</span>
  <span style="flex:1"></span>
  <span class="pill" id="lastPill" onclick="document.getElementById('lastSection').classList.toggle('on')">出牌人 ✕</span>
</div>

<!-- ═══ LAST DISCARD ═══ -->
<div class="section-body" id="lastSection" style="margin-bottom:3px">
  <div class="mini-grid" id="lastGrid" style="display:grid;grid-template-columns:repeat(9,1fr);gap:2px"></div>
  <div style="font-size:.5rem;color:var(--muted);margin-top:1px">点选对方刚打的牌 → 自动分析吃碰杠</div>
</div>

<!-- ═══ DISCARD INPUT ═══ -->
<div class="section-toggle" onclick="tog('discardSec')">
  <span class="arr" id="discardArr">▶</span>
  <span class="t">三家舍牌</span>
  <span class="hint" id="discardHint">0张</span>
</div>
<div class="section-body" id="discardSec">
  <div class="player-strip" id="playerStrip"></div>
  <div id="discardGrid"></div>
</div>

<!-- ═══ OPPONENT MELDS ═══ -->
<div class="section-toggle" onclick="tog('meldSec')">
  <span class="arr" id="meldArr">▶</span>
  <span class="t">他家副露</span>
  <span class="hint" id="meldHint">0组</span>
</div>
<div class="section-body" id="meldSec">
  <div class="mini-form">
    <select id="meldSeat" style="padding:3px 6px;border-radius:4px;border:1px solid rgba(232,197,74,0.06);background:rgba(0,0,0,0.1);color:var(--text);font-size:.55rem;outline:none">
      <option value="1">下家</option><option value="2">对家</option><option value="3">上家</option>
    </select>
    <input id="meldInp" placeholder="编码，如 0,4,8">
    <div class="btn" onclick="addMeld()">+</div>
  </div>
  <div class="meld-bar" id="meldList"></div>
</div>

<!-- ═══ ANALYZE ═══ -->
<div class="analyze-area">
  <button class="analyze-btn" onclick="analyze()">🎯 分析</button>
</div>

<!-- ═══ RESULTS ═══ -->
<div class="result-area" id="resultArea">
  <div id="resultContent"></div>
</div>

<div class="ft">General Mahjong Assist · v1.1</div>
</div>

<script>
// ════════════════ TILE DATA ════════════════
const SUITS=[
  {id:0,name:'万',color:'wan',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:1,name:'条',color:'tiao',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:2,name:'饼',color:'bing',tiles:[1,2,3,4,5,6,7,8,9]},
  {id:3,name:'风',color:'feng',tiles:[1,2,3,4]},
  {id:4,name:'箭',color:'jian',tiles:[1,2,3]},
];
function T(s,r){return s*28+(r-1)*4}

const ALL=[],NAMES={}; SUITS.forEach(s=>s.tiles.forEach(r=>{
  const c=T(s.id,r); ALL.push({code:c,suit:s.id,rank:r,color:s.color});
  const n=['一','二','三','四','五','六','七','八','九','东','南','西','北','中','发','白'];
  NAMES[c]=s.id<=2?(n[r-1]+s.name):['东','南','西','北','中','发','白'][r-1+(s.id===3?0:4)];
}));
function tn(c){return NAMES[c]||'?'}
function ts(c){
  const t=ALL.find(x=>x.code===c); if(!t)return'?';
  if(t.suit<=2)return t.rank+['万','条','饼'][t.suit];
  return '东南西北中发白'[t.rank-1+(t.suit===3?0:4)];
}
function tcolor(c){const t=ALL.find(x=>x.code===c);return t?t.color:'wan'}

// ════════════════ STATE ════════════════
let hand={}; let discards={1:[],2:[],3:[]}; let melds={1:[],2:[],3:[]};
let lastDisc=null; let curP=1;
let isDraw=true; // 自家摸牌

// ════════════════ RENDER HAND ════════════════
function renderHand(){
  // strip — merge same tiles: "1万×3" instead of 3 separate cards
  const codes=Object.keys(hand).map(Number).sort((a,b)=>a-b);
  let hs='';
  if(codes.length===0) hs='<div class="empty">点牌选入手中 · 长按清除</div>';
  else for(const c of codes){
    const n=hand[c]||0;
    const col=tcolor(c);
    hs+=`<div class="tile-card suit-${col}" onclick="rmOne(${c})" title="点移除一张">${ts(c)}${n>1?`<span style="font-size:.45rem;opacity:.7">×${n}</span>`:''}<span class="x">✕</span></div>`;
  }
  document.getElementById('handStrip').innerHTML=hs;

  // count
  const total=Object.values(hand).reduce((a,b)=>a+b,0);
  document.getElementById('cntNum').textContent=total;

  // grid
  let g='';
  for(const s of SUITS){
    g+=`<div class="suit-label">${s.name}</div><div class="tile-grid">`;
    for(const r of s.tiles){
      const c=T(s.id,r), n=hand[c]||0;
      const sel=n>0?' sel':'';
      const cc=s.color;
      const badge=n>0?`<span class="cnt c${Math.min(n,4)}">${n}</span>`:'';
      g+=`<div class="tile${sel} ${cc}" onclick="tapHand(${c})" oncontextmenu="rHand(${c});return false">${ts(c)}${badge}</div>`;
    }
    g+=`</div>`;
  }
  document.getElementById('tileGrid').innerHTML=g;

  // re-bind long press
  document.querySelectorAll('.tile').forEach(el=>{
    let timer; let code;
    el.addEventListener('pointerdown',function(e){
      const m=this.getAttribute('onclick');
      if(m) code=parseInt(m.match(/\d+/)[0]);
      timer=setTimeout(()=>{rHand(code);timer=null},400);
    });
    el.addEventListener('pointerup',()=>{if(timer){clearTimeout(timer);timer=null}});
    el.addEventListener('pointerleave',()=>{if(timer){clearTimeout(timer);timer=null}});
  });

  document.getElementById('resultArea').classList.remove('show');

  // pulse analyze button when hand has enough tiles
  const btn=document.querySelector('.analyze-btn');
  if(total>=13)btn.style.background='linear-gradient(135deg,rgba(232,197,74,0.25),rgba(232,197,74,0.15))';
  else btn.style.background='linear-gradient(135deg,rgba(232,197,74,0.15),rgba(232,197,74,0.08))';
}

function tapHand(c){
  if((hand[c]||0)>=4)return;
  hand[c]=(hand[c]||0)+1; renderHand();
}
function rHand(c){
  if(hand[c]){delete hand[c];renderHand()}
}
function rmOne(c){
  if(hand[c]){hand[c]--;if(hand[c]<=0)delete hand[c];renderHand()}
}
function clrHand(){hand={};renderHand()}

// ════════════════ RENDER DISCARDS ════════════════
function renderPlayers(){
  const n=['','下家','对家','上家'];
  let h='';
  for(let i=1;i<=3;i++){
    const cnt=discards[i].length;
    h+=`<div class="player-chip s${i}${curP===i?' on':''}" onclick="swP(${i})">${n[i]} (${cnt})</div>`;
  }
  document.getElementById('playerStrip').innerHTML=h;
}
function swP(p){curP=p;renderPlayers();renderDisc();updateHints()}

function renderDisc(){
  let h='';
  for(const s of SUITS){
    h+=`<div style="font-size:.5rem;color:var(--muted);margin:2px 0">${s.name}</div><div class="tile-grid">`;
    for(const r of s.tiles){
      const c=T(s.id,r), n=(discards[curP]||[]).filter(x=>x===c).length;
      const sel=n>0?' sel':'';
      h+=`<div class="tile${sel}" onclick="tapDisc(${c})" style="min-height:28px;font-size:.65rem">${ts(c)}${n>1?`<span class="cnt c${Math.min(n,4)}">${n}</span>`:''}</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('discardGrid').innerHTML=h;

  // long press for discard removal
  document.querySelectorAll('#discardGrid .tile').forEach(el=>{
    let timer; let code;
    el.addEventListener('pointerdown',function(e){
      const m=this.getAttribute('onclick');
      if(m) code=parseInt(m.match(/\d+/)[0]);
      timer=setTimeout(()=>{removeDisc(code);timer=null},400);
    });
    el.addEventListener('pointerup',()=>{if(timer){clearTimeout(timer);timer=null}});
    el.addEventListener('pointerleave',()=>{if(timer){clearTimeout(timer);timer=null}});
  });
}
function tapDisc(c){
  if((discards[curP]||[]).filter(x=>x===c).length>=4)return;
  discards[curP].push(c);
  renderDisc();renderPlayers();updateHints();
  document.getElementById('resultArea').classList.remove('show');
}
function removeDisc(c){
  discards[curP]=discards[curP].filter(x=>x!==c);
  renderDisc();renderPlayers();updateHints();
}

// ════════════════ LAST DISCARD ════════════════
function renderLast(){
  let h='';
  for(const s of SUITS){
    h+=`<div style="font-size:.5rem;color:var(--muted);margin:1px 0">${s.name}</div><div class="mini-grid">`;
    for(const r of s.tiles){
      const c=T(s.id,r);
      h+=`<div class="tile ${lastDisc===c?'sel':''}" onclick="tapLast(${c})" style="min-height:26px;font-size:.6rem">${ts(c)}</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('lastGrid').innerHTML=h;
}
function tapLast(c){
  lastDisc=(lastDisc===c?null:c);
  renderLast();
  const p=document.getElementById('lastPill');
  if(lastDisc===null){p.textContent='出牌人 ✕';p.classList.remove('on')}
  else{p.textContent=ts(lastDisc)+' 出';p.classList.add('on')}
  document.getElementById('resultArea').classList.remove('show');
}

// ════════════════ MELDS ════════════════
function addMeld(){
  const s=parseInt(document.getElementById('meldSeat').value);
  const raw=document.getElementById('meldInp').value.trim();
  if(!raw)return;
  const codes=raw.split(',').map(x=>parseInt(x.trim())).filter(n=>!isNaN(n));
  if(codes.length<3)return;
  if(!melds[s])melds[s]=[]; melds[s].push(codes);
  document.getElementById('meldInp').value=''; renderMeldList();
}
function rmMeld(s,i){if(melds[s]){melds[s].splice(i,1);renderMeldList()}}
function renderMeldList(){
  const sn=['','下家','对家','上家']; let total=0,h='';
  for(const[s,list]of Object.entries(melds)){
    for(let i=0;i<list.length;i++){
      total++;
      h+=`<span class="meld-chip" onclick="rmMeld(${s},${i})">${sn[parseInt(s)]}:${list[i].map(c=>ts(c)).join('')}<span class="rm">✕</span></span>`;
    }
  }
  document.getElementById('meldList').innerHTML=h||'<span style="color:var(--muted);font-size:.55rem">暂无</span>';
  document.getElementById('meldHint').textContent=total+'组';
}

// ════════════════ MODE / TOGGLES ════════════════
function toggleMode(){
  isDraw=!isDraw;
  const p=document.getElementById('modePill');
  p.textContent=isDraw?'当前摸牌':'对方出牌';
  p.classList.toggle('on');
}

function tog(id){
  const b=document.getElementById(id);
  const arr=document.getElementById(id.replace('Sec','Arr'));
  if(!b)return;
  b.classList.toggle('on');
  if(arr)arr.classList.toggle('on');
}

function updateHints(){
  const total=discards[1].length+discards[2].length+discards[3].length;
  document.getElementById('discardHint').textContent=total+'张';
}

// ════════════════ HAND TO LIST ════════════════
function handArr(){
  const t=[];
  for(const[c,n]of Object.entries(hand))for(let i=0;i<n;i++)t.push(parseInt(c));
  return t.sort((a,b)=>a-b);
}

// ════════════════ ANALYZE ════════════════
async function analyze(){
  const tiles=handArr();
  if(tiles.length<13){
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('resultContent').innerHTML=`<div class="error">至少需要 13 张牌，当前 ${tiles.length} 张</div>`;
    return;
  }

  const rd=document.getElementById('resultContent');
  rd.innerHTML=`<div class="loading">分析中 ⌛</div>`;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});

  try{
    const body={
      hand:tiles.slice(0,14), melds:[],
      discards:{1:discards[1],2:discards[2],3:discards[3]},
      opponent_melds:{},
      seat_wind:parseInt(document.getElementById('selWind').value),
      round_wind:parseInt(document.getElementById('selRound').value),
      is_self_drawn:isDraw,
    };
    if(lastDisc!==null) body.last_discard=lastDisc;
    for(const[s,l]of Object.entries(melds))if(l.length>0)body.opponent_melds[s]=l;

    const resp=await fetch('/api/game-analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    const data=await resp.json();
    if(!resp.ok){rd.innerHTML=`<div class="error">${data.detail||'分析失败'}</div>`;return}

    let h='';

    // ── HERO: 最显眼的操作建议 ──
    const hasAction=data.action_options&&data.action_options.length>0;
    const hasDiscard=data.discard_options&&data.discard_options.length>0;
    const bestDisc=hasDiscard?data.discard_options[0]:null;
    const tsumo=hasAction?data.action_options.find(a=>a.action==='tsumo'):null;
    const otherAct=hasAction?data.action_options.filter(a=>a.action!=='tsumo'):[];

    // 胡牌优先
    if(tsumo){
      h+=`<div class="action-hero primary">
        <div class="icon-box">🏆</div>
        <div class="main">胡 ${tn(tsumo.tiles[0].code)} <span class="sub">${tsumo.fan}番 · 荣和</span></div>
        <div class="side">${tsumo.fan}番</div>
      </div>`;
    }

    // 最佳出牌
    if(bestDisc){
      const dc={low:'🟢',mid:'🟡',high:'🔴'}[bestDisc.danger_level]||'⚪';
      const st=bestDisc.post_shanten===0?'听牌':bestDisc.post_shanten+'上听';
      h+=`<div class="action-hero discard" onclick="rmOne(${bestDisc.tile.code});renderHand();document.getElementById('resultArea').classList.remove('show')">
        <div class="icon-box">${dc}</div>
        <div class="main">打 ${tn(bestDisc.tile.code)} <span class="sub">${bestDisc.reason} · 进张${bestDisc.acceptance}</span></div>
        <div class="side">${st}</div>
      </div>`;
    }

    // 吃碰杠
    for(const a of otherAct){
      const al={chi:'🟦 吃',pon:'🟧 碰',kan:'🟪 杠'}[a.action]||a.action;
      const tn2=a.tiles.map(t=>tn(t.code)).join('');
      const st2=a.post_shanten===0?'听牌':a.post_shanten===-1?'胡牌':a.post_shanten+'上听';
      h+=`<div class="action-hero action">
        <div class="icon-box" style="font-size:.7rem">${al}</div>
        <div class="main">${tn2} <span class="sub">→ ${st2} · 进张${a.acceptance}${a.fan>0?' · '+a.fan+'番':''}</span></div>
        <div class="side" style="color:${a.post_shanten<=0?'var(--gold)':'var(--green)'}">${st2}</div>
      </div>`;
    }

    // ── Shanten ──
    const sc=data.shanten===0?'gold':data.shanten<=1?'green':data.shanten===-1?'red':'orange';
    const stxt=data.shanten===-1?'🏆 胡牌！':data.shanten===0?'🎯 听牌！':`⬆ ${data.shanten} 上听`;
    h+=`<div style="display:flex;gap:4px;margin:4px 0">
      <div style="flex:1;background:rgba(0,0,0,0.06);border-radius:6px;padding:5px 8px">
        <div style="font-size:.55rem;color:var(--muted)">向听</div>
        <div style="font-size:.85rem;font-weight:800;color:var(--${sc})">${stxt}</div>
      </div>
      <div style="flex:1;background:rgba(0,0,0,0.06);border-radius:6px;padding:5px 8px">
        <div style="font-size:.55rem;color:var(--muted)">进张</div>
        <div style="font-size:.85rem;font-weight:800;color:var(--green)">${data.acceptance} 张</div>
      </div>
    </div>`;

    // ── Acceptance tiles ──
    if(data.acceptance_tiles&&data.acceptance_tiles.length>0){
      h+=`<div style="background:rgba(0,0,0,0.05);border-radius:6px;padding:4px 8px;margin-bottom:4px">
        <div style="font-size:.5rem;color:var(--muted);margin-bottom:2px">进张牌</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">`;
      for(const t of data.acceptance_tiles)
        h+=`<span style="padding:1px 6px;border-radius:8px;background:rgba(74,154,90,0.06);border:1px solid rgba(74,154,90,0.08);font-size:.6rem">${tn(t.code)}</span>`;
      h+=`</div></div>`;
    }

    // ── All discard options ──
    if(hasDiscard&&data.discard_options.length>1){
      h+=`<div class="listen-card"><div class="lbl">出牌对比</div>
        <table class="listen-table"><tr><th>牌</th><th>打后</th><th>进张</th><th>危险</th></tr>`;
      for(const o of data.discard_options){
        const dc2={low:'🟢',mid:'🟡',high:'🔴'}[o.danger_level]||'⚪';
        const st3=o.post_shanten===0?'听牌':o.post_shanten+'上听';
        h+=`<tr${o===data.discard_options[0]?' style="background:rgba(232,197,74,0.03)"':''}>
          <td class="tn">${tn(o.tile.code)}</td><td>${st3}</td>
          <td>${o.acceptance}</td><td>${dc2}</td></tr>`;
      }
      h+=`</table></div>`;
    }

    // ── Listen ──
    if(data.listen_analysis&&data.listen_analysis.is_tenpai&&data.listen_analysis.options.length>0){
      const best=data.listen_analysis.options[0];
      h+=`<div class="listen-card"><div class="lbl">🏆 最佳听牌</div>
        <div style="font-size:.85rem;font-weight:800;color:var(--gold-pale);margin-bottom:4px">
          ${tn(best.tile.code)} · ${best.fan}番 · 剩${best.remaining}张</div>`;

      if(best.fan_items&&best.fan_items.length>0){
        h+=`<div style="background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 6px;margin-bottom:4px">`;
        for(const f of best.fan_items.slice(0,8))
          h+=`<div class="fan-item">${f.name}<span class="fv">${f.fan}番</span></div>`;
        h+=`</div>`;
      }

      if(data.listen_analysis.options.length>1){
        h+=`<table class="listen-table"><tr><th>牌</th><th>剩</th><th>番</th><th>评分</th></tr>`;
        for(const o of data.listen_analysis.options){
          h+=`<tr${o===data.listen_analysis.options[0]?' style="background:rgba(232,197,74,0.03)"':''}>
            <td class="tn">${tn(o.tile.code)}</td><td>×${o.remaining}</td>
            <td class="fn" style="color:var(--orange);font-weight:700">${o.fan}番</td>
            <td class="sc">${o.score.toFixed(1)}</td></tr>`;
        }
        h+=`</table>`;
      }
      h+=`</div>`;
    }

    // ── Defense ──
    if(data.defense&&data.defense.dangerous_tiles&&data.defense.dangerous_tiles.length>0){
      h+=`<div class="def-section">
        <div class="lbl">🔴 危险牌</div>`;
      for(const d of data.defense.dangerous_tiles.slice(0,10))
        h+=`<span class="def-chip danger">${tn(d.tile)}</span>`;
      h+=`</div>`;
      if(data.defense.safe_tiles&&data.defense.safe_tiles.length>0){
        h+=`<div class="def-section">
          <div class="lbl">🟢 安全牌</div>`;
        for(const s of data.defense.safe_tiles.slice(0,8))
          h+=`<span class="def-chip safe">${tn(s.tile)}</span>`;
        h+=`</div>`;
      }
    }

    rd.innerHTML=h;

  }catch(e){
    rd.innerHTML=`<div class="error">请求失败: ${e.message}</div>`;
  }
}

// ════════════════ INIT ════════════════
renderHand(); renderPlayers(); renderDisc(); renderLast(); renderMeldList();
// Open discards by default
document.getElementById('discardSec').classList.add('on');
document.getElementById('discardArr').classList.add('on');
</script>
</body>
</html>
